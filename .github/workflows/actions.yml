name: IaC Security Scan

on:
  workflow_dispatch:
    inputs:
      customer_id:
        description: 'ID khach hang (vd: cust-acme)'
        required: true
        type: string
      scan_regions:
        description: 'AWS region(s) can phan cach dau phay'
        required: false
        default: 'ap-southeast-1'
        type: string
  schedule:
    # Quet moi ngay 00:00 UTC (07:00 GMT+7)
    - cron: '0 0 * * *'
  push:
    branches: [ test ]
  pull_request:
    branches: [ test ]

# NOTE: cron/push/PR chay cho mac dinh (khong co customer_id),
# workflow_dispatch yeu cau truyen customer_id.
# Concurrency: chi cho 1 run/khach chay cung luc de tranh ghi de secret
concurrency:
  group: iac-scan-${{ github.event.inputs.customer_id || 'default' }}
  cancel-in-progress: false

jobs:
  iac-security:
    runs-on: ubuntu-latest
    # Environment dong: moi khach = 1 env rieng (secret rieng)
    # Neu khong co customer_id (cron/push) -> dung env "secrets" mac dinh
    environment: ${{ github.event.inputs.customer_id || 'secrets' }}
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve customer ID
        id: cust
        run: |
          CUST="${{ github.event.inputs.customer_id || 'default' }}"
          echo "customer_id=$CUST" >> $GITHUB_OUTPUT
          echo "San scan cho khach: $CUST"

      - name: Install Terraformer
        run: |
          export PROVIDER=all
          curl -LO "https://github.com/GoogleCloudPlatform/terraformer/releases/download/$(curl -s https://api.github.com/repos/GoogleCloudPlatform/terraformer/releases/latest | grep tag_name | cut -d '"' -f 4)/terraformer-${PROVIDER}-linux-amd64"
          chmod +x terraformer-${PROVIDER}-linux-amd64
          sudo mv terraformer-${PROVIDER}-linux-amd64 /usr/local/bin/terraformer
          terraformer --version

      - name: Verify AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ github.event.inputs.scan_regions || 'ap-southeast-1' }}
        run: aws sts get-caller-identity

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Run Terraformer (import AWS -> .tf)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ github.event.inputs.scan_regions || 'ap-southeast-1' }}
          AWS_DEFAULT_REGION: ${{ github.event.inputs.scan_regions || 'ap-southeast-1' }}
        run: |
          mkdir -p iac
          cd iac
          cat <<EOF > provider.tf
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "5.0.0"
              }
            }
          }
          provider "aws" {
            region = "${{ github.event.inputs.scan_regions || 'ap-southeast-1' }}"
          }
          EOF
          terraform init
          mkdir -p ~/.terraform.d/plugins/linux_amd64
          find .terraform/providers -type f -name "terraform-provider-aws_*" -exec cp {} ~/.terraform.d/plugins/linux_amd64/ \;
          mkdir -p ~/.aws
          printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\n' "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" > ~/.aws/credentials
          printf '[default]\nregion = ${{ github.event.inputs.scan_regions || 'ap-southeast-1' }}\n' > ~/.aws/config
          aws sts get-caller-identity || echo "WARNING: AWS credentials invalid"
          terraformer import aws --resources=instance,s3,iam,ecs,ecr --regions=${{ github.event.inputs.scan_regions || 'ap-southeast-1' }} --profile=default
          find . -name "*.tf" | head -30

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.x'

      # =========================================================
      # KICS - quet IaC: misconfiguration / IAM / secret trong .tf
      # =========================================================
      - name: Create KICS results dir
        run: mkdir -p kics-results

      - name: Run KICS scan
        uses: Checkmarx/kics-github-action@v2.1.20
        with:
          path: ./iac
          output_path: kics-results
          output_formats: 'json,sarif'
          ignore_on_exit: results

      # =========================================================
      # Trich xuat container image tu KICS output
      # =========================================================
      - name: Extract images from KICS results
        run: |
          cat <<'EOF' > extract_images.py
          import json, glob, re

          images = set()

          for fpath in glob.glob("kics-results/*.json"):
              try:
                  with open(fpath) as f:
                      raw = json.load(f)
              except Exception:
                  continue
              results = raw.get("results", []) if isinstance(raw, dict) else raw
              for finding in (results if isinstance(results, list) else []):
                  if not isinstance(finding, dict):
                      continue
                  blob = json.dumps(finding)
                  for m in re.findall(r'image\s*=\s*"([^"]+)"', blob):
                      images.add(m)
                  for m in re.findall(r'"image"\s*:\s*"([^"]+)"', blob):
                      images.add(m)

          if not images:
              for tfpath in glob.glob("iac/**/*.tf", recursive=True):
                  try:
                      with open(tfpath) as f:
                          txt = f.read()
                  except Exception:
                      continue
                  for m in re.findall(r'image\s*=\s*"([^"]+)"', txt):
                      images.add(m)
                  for m in re.findall(r'"image"\s*:\s*"([^"]+)"', txt):
                      images.add(m)

          if images:
              for image in images:
                  print(image)
          else:
              print("NO_IMAGES_FOUND")
          EOF
          python3 extract_images.py > trivy-targets.txt
          echo "=== Images found ==="
          cat trivy-targets.txt

      # =========================================================
      # Trivy - secret + CVE (bo SBOM de giam thoi gian)
      # =========================================================
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy - secret scan IaC
        continue-on-error: true
        run: |
          mkdir -p trivy-results
          trivy fs ./iac \
            --scanners secret \
            --skip-dirs .terraform \
            --format json \
            --output trivy-results/secret-iac.json || true

      - name: Trivy - vulnerability scan images
        continue-on-error: true
        run: |
          if grep -q "NO_IMAGES_FOUND" trivy-targets.txt; then
            echo "No images to scan, skipping image scan"
            echo '{"images": [], "message": "No container images found"}' \
              > trivy-results/image-results.json
          else
            while IFS= read -r image; do
              [ -n "$image" ] || continue
              echo "Scanning image: $image"
              safe_name=$(echo "$image" | tr '/:.' '---')
              trivy image \
                --scanners vuln,misconfig \
                --format json \
                --output "trivy-results/image-${safe_name}.json" \
                "$image" || echo "WARNING: Could not scan $image"
            done < trivy-targets.txt
          fi

      # =========================================================
      # Merge Trivy results (bo SBOM)
      # =========================================================
      - name: Merge Trivy results
        run: |
          cat <<'EOF' > merge_trivy.py
          import json, os, glob

          def load(p):
              if os.path.exists(p) and os.path.getsize(p) > 0:
                  try:
                      with open(p) as f:
                          return json.load(f)
                  except Exception:
                      return {}
              return {}

          final = {
              "secret_scan_iac": load("trivy-results/secret-iac.json"),
              "image_scans": [],
          }

          for f in sorted(glob.glob("trivy-results/image-*.json")):
              if f != "trivy-results/image-results.json":
                  final["image_scans"].append(load(f))
          if not final["image_scans"]:
              final["image_scans"] = load("trivy-results/image-results.json")

          with open("trivy-results/trivy-results.json", "w") as f:
              json.dump(final, f, indent=2)
          print("Merged => trivy-results/trivy-results.json")
          EOF
          python3 merge_trivy.py

      # =========================================================
      # Normalize: chuan hoa KICS + Trivy -> format dashboard
      # =========================================================
      - name: Normalize results for dashboard
        run: |
          cat <<'EOF' > normalize.py
          import json, os, glob, datetime, hashlib

          CUSTOMER = os.getenv("CUSTOMER_ID", "default")

          def load(p):
              if os.path.exists(p) and os.path.getsize(p) > 0:
                  try:
                      with open(p) as f:
                          return json.load(f)
                  except Exception:
                      return {}
              return {}

          SEV_MAP = {
              "CRITICAL": "CRITICAL",
              "HIGH": "HIGH",
              "MEDIUM": "MEDIUM",
              "LOW": "LOW",
              "INFO": "INFO",
          }

          findings = []

          # --- KICS findings ---
          kics = load("kics-results/results.json")
          for q in (kics.get("queries") or []):
              sev_raw = (q.get("severity") or "INFO").upper()
              sev = SEV_MAP.get(sev_raw, "INFO")
              qname = q.get("name") or q.get("query_name") or "unknown"
              category = q.get("category") or ""
              platform = q.get("platform") or "aws"
              cwe = ""
              if q.get("tags"):
                  for t in q.get("tags"):
                      if isinstance(t, str) and t.startswith("CWE"):
                          cwe = t.replace("CWE-", "")
                          break
              for f in (q.get("files") or []):
                  fname = f.get("file_name") or f.get("file") or ""
                  line = f.get("line")
                  resolved = f.get("resolved") or ""
                  val_exp = f.get("expected_value") or ""
                  val_act = f.get("actual_value") or resolved
                  rid = hashlib.md5(f"{qname}{fname}{line}".encode()).hexdigest()[:10]
                  findings.append({
                      "id": rid,
                      "query_name": qname,
                      "severity": sev,
                      "cloud_provider": "AWS",
                      "file": fname,
                      "line": line,
                      "category": category,
                      "platform": platform,
                      "cwe": cwe,
                      "description": q.get("description") or "",
                      "expected_value": val_exp,
                      "actual_value": val_act,
                      "resource_type": "",
                      "resource_name": "",
                      "risk_score": "",
                      "source": "kics"
                  })

          # --- Trivy secret findings ---
          trivy = load("trivy-results/trivy-results.json")
          sec = trivy.get("secret_scan_iac") or {}
          for r in (sec.get("Results") or []):
              tgt = r.get("Target") or ""
              for f in (r.get("Secrets") or []):
                  ruleid = f.get("RuleID") or "secret"
                  title = f.get("Title") or ruleid
                  sev_raw = (f.get("Severity") or "MEDIUM").upper()
                  sev = SEV_MAP.get(sev_raw, "MEDIUM")
                  line = f.get("StartLine")
                  rid = hashlib.md5(f"{ruleid}{tgt}{line}".encode()).hexdigest()[:10]
                  findings.append({
                      "id": rid,
                      "query_name": f"Secret: {title}",
                      "severity": sev,
                      "cloud_provider": "AWS",
                      "file": tgt,
                      "line": line,
                      "category": "Secret",
                      "platform": "trivy",
                      "cwe": "",
                      "description": f.get("Match") or "",
                      "expected_value": "",
                      "actual_value": "hardcoded secret detected",
                      "resource_type": "",
                      "resource_name": "",
                      "risk_score": "",
                      "source": "trivy"
                  })

          # --- Trivy image vuln findings ---
          for img in (trivy.get("image_scans") or []):
              if isinstance(img, dict):
                  tgt = img.get("ArtifactName") or ""
                  for r in (img.get("Results") or []):
                      for v in (r.get("Vulnerabilities") or []):
                          vid = v.get("VulnerabilityID") or "CVE"
                          pkg = v.get("PkgName") or ""
                          sev_raw = (v.get("Severity") or "MEDIUM").upper()
                          sev = SEV_MAP.get(sev_raw, "MEDIUM")
                          rid = hashlib.md5(f"{vid}{pkg}".encode()).hexdigest()[:10]
                          findings.append({
                              "id": rid,
                              "query_name": f"{vid}: {pkg}",
                              "severity": sev,
                              "cloud_provider": "AWS",
                              "file": tgt,
                              "line": None,
                              "category": "Vulnerability",
                              "platform": "trivy-image",
                              "cwe": "",
                              "description": v.get("Title") or vid,
                              "expected_value": "",
                              "actual_value": v.get("InstalledVersion") or "",
                              "resource_type": "container-image",
                              "resource_name": tgt,
                              "risk_score": "",
                              "source": "trivy"
                          })

          # --- Summary ---
          summary = {
              "total": len(findings),
              "critical": sum(1 for f in findings if f["severity"] == "CRITICAL"),
              "high":     sum(1 for f in findings if f["severity"] == "HIGH"),
              "medium":   sum(1 for f in findings if f["severity"] == "MEDIUM"),
              "low":      sum(1 for f in findings if f["severity"] == "LOW"),
              "info":     sum(1 for f in findings if f["severity"] == "INFO"),
          }

          # Cloud breakdown (Tat ca deu la AWS, de cho dashboard)
          cloud_breakdown = [{"provider": "AWS", "count": len(findings)}]

          # Top categories
          cat_counts = {}
          for f in findings:
              c = f.get("category") or "Other"
              cat_counts[c] = cat_counts.get(c, 0) + 1
          top_categories = sorted(
              [{"category": k, "count": v} for k, v in cat_counts.items()],
              key=lambda x: -x["count"]
          )[:10]

          merged = {
              "customer_id": CUSTOMER,
              "scanned_at": datetime.datetime.utcnow().isoformat() + "Z",
              "summary": summary,
              "cloud_breakdown": cloud_breakdown,
              "top_categories": top_categories,
              "findings": findings,
          }

          os.makedirs("merged", exist_ok=True)
          with open("merged/merged-results.json", "w") as out:
              json.dump(merged, out, indent=2, ensure_ascii=False)
          print(f"Normalized {len(findings)} findings for {CUSTOMER}")
          EOF
          CUSTOMER_ID="${{ steps.cust.outputs.customer_id }}" python3 normalize.py

      # =========================================================
      # Upload S3: folder theo khach + latest/history
      # =========================================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.S3_UPLOAD_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_UPLOAD_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Upload results to S3 (per-customer structure)
        run: |
          CUSTOMER="${{ steps.cust.outputs.customer_id }}"
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          BUCKET="scanning-result-bucket"
          PREFIX="customers/${CUSTOMER}"

          echo "Uploading for customer: ${CUSTOMER}"

          # latest/
          aws s3 cp kics-results/results.json \
            "s3://${BUCKET}/${PREFIX}/latest/kics-results.json"
          aws s3 cp trivy-results/trivy-results.json \
            "s3://${BUCKET}/${PREFIX}/latest/trivy-results.json"
          aws s3 cp merged/merged-results.json \
            "s3://${BUCKET}/${PREFIX}/latest/merged-results.json"

          # history/
          HIST="${PREFIX}/history/${TS}"
          aws s3 cp kics-results/results.json \
            "s3://${BUCKET}/${HIST}/kics-results.json"
          aws s3 cp trivy-results/trivy-results.json \
            "s3://${BUCKET}/${HIST}/trivy-results.json"
          aws s3 cp merged/merged-results.json \
            "s3://${BUCKET}/${HIST}/merged-results.json"

          echo "Uploaded to ${PREFIX}/latest and ${HIST}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: iac-scan-reports-${{ steps.cust.outputs.customer_id }}
          path: |
            kics-results/
            trivy-results/trivy-results.json
            merged/merged-results.json
